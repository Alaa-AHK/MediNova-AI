<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediNova-AI — Clinical Decision Support System</title>
  <meta name="description" content="AI-powered clinical decision support for emergency medicine — skin analysis, chest X-ray, and symptom triage." />
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div class="app-shell">

    <!-- ══ HAMBURGER BUTTON ══ -->
    <button id="hamburger-btn" class="hamburger-btn" title="Open Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>

    <!-- ══ OFF-CANVAS SETTINGS DRAWER ══ -->
    <div id="drawer-overlay" class="drawer-overlay"></div>
    <aside id="settings-drawer" class="settings-drawer">
      <div class="drawer-header">
        <div class="brand">
          <span class="brand-mark" style="background: transparent; box-shadow: none; overflow: hidden; padding: 0;">
            <img src="robot.png" style="width: 100%; height: 100%; object-fit: cover;" />
          </span>
          <div>
            <div class="brand-name">MediNova-AI</div>
            <div class="brand-sub">Clinical AI System</div>
          </div>
        </div>
        <button id="close-drawer-btn" class="close-drawer-btn">✕</button>
      </div>

      <div class="drawer-content">
        
        <div class="drawer-section">
          <div class="drawer-section-title">Voice Settings</div>
          <div class="drawer-field">
            <label>Gender</label>
            <select id="global-voice-gender">
              <option value="female">Female</option>
              <option value="male">Male</option>
            </select>
          </div>
          <div class="drawer-field">
            <label>Pitch (<span id="global-pitch-val">1.0</span>)</label>
            <input type="range" id="global-voice-pitch" min="0" max="2" step="0.1" value="1.0" />
          </div>
          <div class="drawer-field">
            <label>Speed (<span id="global-speed-val">0.9</span>)</label>
            <input type="range" id="global-voice-speed" min="0.5" max="2" step="0.1" value="0.9" />
          </div>
        </div>

        <div class="drawer-section">
          <div class="drawer-section-title">App Settings</div>
          <button id="theme-toggle" class="toggle-btn" title="Toggle Theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <span class="toggle-text" data-i18n="theme_btn">Theme</span>
          </button>
          <button id="lang-toggle" class="toggle-btn" title="Toggle Language">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
              <path d="M2 12h20"/>
            </svg>
            <span class="toggle-text" data-i18n="lang_btn">عربي</span>
          </button>
        </div>

        <div class="drawer-section">
          <div class="drawer-section-title">Connection</div>
          <div class="drawer-field">
            <label>Backend API URL</label>
            <input type="text" id="global-api-url" placeholder="https://your-ngrok-url.ngrok-free.dev" />
          </div>
          <div class="drawer-field">
            <label>Session ID</label>
            <input type="text" id="global-session-id" placeholder="auto-generated" />
          </div>
        </div>

      </div>

      <div class="drawer-footer">
        MediNova-AI · v2.0<br/>
        Research prototype · Not a medical device
      </div>
    </aside>

    <!-- ══ MAIN ══ -->
    <main class="main" id="app"></main>

  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
